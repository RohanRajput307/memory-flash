<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Memory Flash</title>

  <!-- =====================================================
       FAVICON & ICONS
       Files needed in your root folder:
       - favicon.ico         (from favicon_io folder)
       - favicon-32x32.png   (from favicon_io folder)
       - favicon-16x16.png   (from favicon_io folder)
       - apple-touch-icon.png(from favicon_io folder)
       - icon of game.png    (your original 512x512)
  ====================================================== -->
  <link rel="shortcut icon"                              href="favicon.ico" type="image/x-icon">
  <link rel="icon" type="image/png" sizes="32x32"        href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16"        href="favicon-16x16.png">
  <link rel="apple-touch-icon"      sizes="180x180"      href="apple-touch-icon.png">

  <!-- =====================================================
       OPEN GRAPH — Discord / WhatsApp / Portal previews
       og:image must be a full URL when live (e.g. https://yourdomain.com/icon of game.png)
  ====================================================== -->
  <meta property="og:title"       content="Memory Flash">
  <meta property="og:description" content="Test your memory — how far can you go?">
  <meta property="og:image"       content="icon of game.png">
  <meta property="og:type"        content="website">
  <meta name="twitter:card"       content="summary_large_image">
  <meta name="twitter:image"      content="icon of game.png">
  <meta name="description"        content="Memory Flash — watch the sequence, repeat it. Speed increases every level.">

  <!-- =====================================================
       GAME PORTAL AD SDKs  (all load async — safe to have all 3)
       CrazyGames  → crazygames.com/sdk
       Poki        → sdk.poki.com
       GameDistrib → gamedistribution.com/sdk
  ====================================================== -->
  <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"        async></script>
  <script src="https://game-cdn.poki.com/scripts/v2/poki-sdk.js"       async></script>
  <script src="https://html5.api.gamedistribution.com/main.min.js"     async></script>

  <!-- FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=VT323&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg:         #080A0C;
      --surface:    #0F1214;
      --border-col: #1E2226;
      --text:       #F0F0EC;
      --muted:      #454A52;
      --acid:       #AAFF00;
      --red:        #FF2222;
      --yellow:     #FFE500;
      --orange:     #FF6B00;
      --pink:       #FF2D78;
      --snow:       #FFFFFF;
      --fd: 'Bebas Neue', sans-serif;
      --fr: 'VT323', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { width: 100%; height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--fr);
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* CRT scanlines */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px
      );
      pointer-events: none; z-index: 1000;
    }

    #particleCanvas { position: fixed; inset: 0; pointer-events: none; z-index: 500; }

    /* ---- ANIMATIONS ---- */
    @keyframes shake {
      0%,100% { transform: translate(0,0) rotate(0deg); }
      20%  { transform: translate(-5px, 3px) rotate(-0.4deg); }
      40%  { transform: translate(5px, -3px) rotate(0.4deg); }
      60%  { transform: translate(-3px,-4px) rotate(-0.2deg); }
      80%  { transform: translate(3px,  4px) rotate(0.2deg); }
    }
    body.shaking { animation: shake 0.1s infinite; }

    @keyframes tileClick {
      0%   { transform: scale(1); }
      30%  { transform: scale(0.85); }
      65%  { transform: scale(1.07); }
      100% { transform: scale(1); }
    }
    @keyframes lvUp {
      0%   { opacity:0; transform:scale(0.4) translateY(20px); }
      25%  { opacity:1; transform:scale(1.15) translateY(0); }
      65%  { opacity:1; transform:scale(1) translateY(0); }
      100% { opacity:0; transform:scale(0.95) translateY(-10px); }
    }
    @keyframes scoreFloat {
      0%   { opacity:1; transform:translate(-50%,-50%) scale(1); }
      100% { opacity:0; transform:translate(-50%,-130%) scale(1.6); }
    }
    @keyframes wrongShake {
      0%,100% { transform:translateX(0); }
      20% { transform:translateX(-8px); }
      40% { transform:translateX(8px); }
      60% { transform:translateX(-5px); }
      80% { transform:translateX(5px); }
    }
    @keyframes dotPulse {
      0%,100% { transform:scale(1); }
      50%     { transform:scale(1.7); }
    }
    @keyframes bootIn {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ---- LAYOUT WRAPPER ---- */
    #gameWrap {
      width: 100%;
      max-width: min(520px, 96vw);
      min-height: 100%;
      display: flex;
      flex-direction: column;
      padding: clamp(10px,2.5vh,26px) clamp(12px,3vw,28px) clamp(16px,2.5vh,28px);
      gap: clamp(8px,1.5vh,14px);
      animation: bootIn 0.45s ease both;
    }

    /* allow scroll on small screens so button is never cut off */
    @media (max-height: 680px) {
      body { overflow-y: auto; }
      #gameWrap { height: auto; }
      #gameGrid { min-height: 260px; }
    }

    /* ---- HEADER ---- */
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-shrink: 0;
    }
    .logo {
      font-family: var(--fd);
      font-size: clamp(32px,6vw,52px);
      line-height: 0.9; color: var(--text); letter-spacing: 2px;
    }
    .score-col { text-align: right; }
    .score-label {
      display: block;
      font-family: var(--fr);
      font-size: clamp(10px,1.1vw,13px);
      letter-spacing: 5px; color: var(--muted);
    }
    .score-val {
      font-family: var(--fd);
      font-size: clamp(36px,6vw,56px);
      line-height: 0.9; color: var(--yellow);
      transition: color 0.2s;
    }
    .score-val.bump { color: var(--acid); }

    .sep-line { height:1px; background:var(--border-col); flex-shrink:0; }

    /* ---- STATUS ---- */
    .status-row {
      display: flex; justify-content: space-between;
      align-items: center; flex-shrink: 0;
    }
    .level-group { display:flex; align-items:baseline; gap:7px; }
    .lv-label {
      font-family:var(--fr);
      font-size:clamp(11px,1.2vw,14px);
      letter-spacing:4px; color:var(--muted);
    }
    .lv-num {
      font-family:var(--fd);
      font-size:clamp(32px,5vw,44px);
      line-height:1; color:var(--acid);
      transition: transform 0.25s cubic-bezier(.18,.89,.32,1.28), color 0.2s;
    }
    .lv-num.pop { transform:scale(1.35); color:var(--snow); }
    .speed-tag {
      font-family:var(--fr);
      font-size:clamp(10px,1.1vw,13px);
      letter-spacing:3px; color:var(--muted);
      border:1px solid var(--border-col); padding:3px 10px;
      transition: color 0.3s, border-color 0.3s;
    }
    .lives-row { display:flex; gap:6px; align-items:center; }
    .heart {
      font-size:clamp(16px,2.2vw,22px); line-height:1;
      transition: transform 0.2s, filter 0.2s;
    }
    .heart.full  { color:var(--red); filter:drop-shadow(0 0 4px var(--red)); }
    .heart.empty { color:var(--muted); filter:none; }

    /* ---- PROGRESS ---- */
    .prog-row { display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .prog-bar { flex:1; height:3px; background:var(--border-col); overflow:hidden; }
    .prog-fill {
      height:100%; background:var(--acid); width:0%;
      transition: width 0.6s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 0 8px var(--acid);
    }
    .prog-label {
      font-family:var(--fr);
      font-size:clamp(10px,1.1vw,13px);
      letter-spacing:2px; color:var(--muted); white-space:nowrap;
    }

    /* ---- SEQ DOTS ---- */
    .seq-wrap {
      display:flex; justify-content:center; align-items:center;
      gap:5px; min-height:16px; flex-shrink:0; flex-wrap:wrap;
    }
    .sdot {
      width:6px; height:6px; border-radius:50%;
      border:1px solid var(--muted); background:transparent;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .sdot.done { background:var(--acid); border-color:var(--acid); box-shadow:0 0 6px var(--acid); }
    .sdot.cur  { border-color:var(--yellow); background:rgba(255,229,0,0.25); animation:dotPulse 0.5s ease infinite; }

    /* ---- PHASE LABEL ---- */
    .phase-bar {
      text-align:center; font-family:var(--fr);
      font-size:clamp(14px,1.8vw,19px); letter-spacing:6px;
      color:var(--muted); height:clamp(18px,2.5vh,24px);
      transition:color 0.25s; flex-shrink:0;
    }
    .phase-bar.watch { color:var(--yellow); }
    .phase-bar.go    { color:var(--acid); }

    /* ---- GRID ---- */
    #gameGrid {
      display:grid; grid-template-columns:repeat(3,1fr);
      gap:clamp(8px,1.8vw,14px); flex:1; min-height:0;
    }
    .tile {
      width:100%; height:100%;
      cursor:pointer; position:relative;
      user-select:none;
      border-radius:clamp(4px,0.8vw,8px);
      transition: transform 0.12s ease, filter 0.12s ease;
      overflow:hidden;
    }
    .tile[data-id="0"] { --tc:var(--red); }
    .tile[data-id="1"] { --tc:var(--acid); }
    .tile[data-id="2"] { --tc:var(--yellow); }
    .tile[data-id="3"] { --tc:var(--orange); }
    .tile[data-id="4"] { --tc:var(--pink); }
    .tile[data-id="5"] { --tc:var(--snow); }
    .tile-face { position:absolute; inset:0; background:var(--tc); transition:filter 0.12s; }
    .tile-veil { position:absolute; inset:0; background:rgba(0,0,0,0.45); transition:opacity 0.12s; }
    .tile-num  {
      position:absolute; bottom:6px; right:8px;
      font-family:var(--fd); font-size:clamp(12px,1.6vw,20px);
      color:rgba(0,0,0,0.22); pointer-events:none;
    }
    .tc { position:absolute; width:10px; height:10px; border:2px solid rgba(0,0,0,0.18); }
    .tc.tl { top:6px;    left:6px;  border-right:0; border-bottom:0; }
    .tc.tr { top:6px;    right:6px; border-left:0;  border-bottom:0; }
    .tc.bl { bottom:6px; left:6px;  border-right:0; border-top:0; }
    .tc.br { bottom:6px; right:6px; border-left:0;  border-top:0; }
    .tile.flash .tile-veil { opacity:0; }
    .tile.flash .tile-face { filter:brightness(1.5); }
    .tile.flash {
      box-shadow: 0 0 24px 6px var(--tc),
                  0 0 55px 18px color-mix(in srgb, var(--tc) 35%, transparent);
      transform: scale(0.93);
    }
    .tile.clicked { animation:tileClick 0.26s ease; }
    .tile.wrong   { animation:wrongShake 0.3s ease; }

    /* ---- START BTN ---- */
    #startBtn {
      width:100%; padding:clamp(12px,2vh,18px);
      font-family:var(--fd); font-size:clamp(20px,3vw,30px);
      letter-spacing:6px; background:var(--acid); color:var(--bg);
      border:none; cursor:pointer; flex-shrink:0;
      min-height: 52px;
      transition: box-shadow 0.2s, transform 0.1s;
    }
    #startBtn:hover { box-shadow:0 0 28px var(--acid),0 0 60px rgba(170,255,0,0.25); }
    #startBtn:active { transform:scale(0.98); }

    /* ---- LEVEL UP OVERLAY ---- */
    #lvOverlay {
      position:fixed; inset:0;
      display:flex; align-items:center; justify-content:center;
      z-index:200; pointer-events:none; opacity:0;
    }
    #lvOverlay.show { animation:lvUp 1.1s cubic-bezier(.18,.89,.32,1.28) forwards; }
    .lv-up-txt {
      font-family:var(--fd); font-size:clamp(52px,10vw,88px);
      letter-spacing:8px; color:var(--acid);
      text-shadow:0 0 30px var(--acid),0 0 80px var(--acid);
    }

    /* ---- AD SCREEN ---- */
    #adScreen {
      display:none; position:fixed; inset:0; z-index:800;
      background:var(--bg);
      flex-direction:column; align-items:center; justify-content:center;
      gap:20px;
    }
    #adScreen.visible { display:flex; }
    .ad-icon { width:clamp(60px,10vw,88px); height:clamp(60px,10vw,88px); object-fit:contain; }
    .ad-txt {
      font-family:var(--fd); font-size:clamp(18px,3vw,26px);
      letter-spacing:5px; color:var(--muted);
    }
    .ad-bar-wrap { width:200px; height:3px; background:var(--border-col); }
    .ad-bar { height:100%; width:0%; background:var(--acid); box-shadow:0 0 8px var(--acid); transition:width 0.3s linear; }

    /* ---- MODAL ---- */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.93);
      display:none; align-items:center; justify-content:center; z-index:400;
    }
    .modal-overlay.visible { display:flex; }
    .modal {
      background:var(--bg); border:1px solid var(--border-col);
      padding:clamp(24px,4vw,40px) clamp(20px,4vw,36px);
      width:90%; max-width:420px;
      display:flex; flex-direction:column; gap:clamp(12px,2vh,18px);
    }
    .modal-title {
      font-family:var(--fd); font-size:clamp(40px,7vw,60px);
      color:var(--red); letter-spacing:3px; line-height:0.9;
    }
    .modal-sub { font-family:var(--fr); font-size:clamp(13px,1.5vw,17px); letter-spacing:4px; color:var(--muted); }
    .modal-stats { display:flex; border-top:1px solid var(--border-col); border-bottom:1px solid var(--border-col); }
    .stat-cell { flex:1; padding:14px 0; text-align:center; }
    .stat-cell+.stat-cell { border-left:1px solid var(--border-col); }
    .stat-lbl { display:block; font-family:var(--fr); font-size:clamp(11px,1.2vw,13px); letter-spacing:4px; color:var(--muted); }
    .stat-val  { font-family:var(--fd); font-size:clamp(28px,4.5vw,40px); color:var(--yellow); }
    .btn-ad {
      padding:clamp(12px,2vh,18px); font-family:var(--fd);
      font-size:clamp(18px,2.5vw,26px); letter-spacing:4px;
      background:transparent; color:var(--acid);
      border:1px solid var(--acid); cursor:pointer; transition:all 0.2s;
    }
    .btn-ad:hover { background:var(--acid); color:var(--bg); box-shadow:0 0 24px var(--acid); }
    .btn-restart {
      padding:clamp(10px,1.5vh,14px); font-family:var(--fd);
      font-size:clamp(16px,2vw,20px); letter-spacing:4px;
      background:transparent; color:var(--muted);
      border:1px solid var(--border-col); cursor:pointer; transition:all 0.2s;
    }
    .btn-restart:hover { border-color:var(--red); color:var(--red); }
  </style>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<!-- AD LOADING SCREEN -->
<div id="adScreen">
  <img class="ad-icon" src="icon of game.png" alt="Memory Flash">
  <div class="ad-txt" id="adTxt">LOADING AD...</div>
  <div class="ad-bar-wrap"><div class="ad-bar" id="adBar"></div></div>
</div>

<div id="gameWrap">
  <header>
    <div>
      <div class="logo">Memory<br>Flash</div>
    </div>
    <div class="score-col">
      <span class="score-label">SCORE</span>
      <div class="score-val" id="scoreDisplay">0</div>
    </div>
  </header>

  <div class="sep-line"></div>

  <div class="status-row">
    <div class="level-group">
      <span class="lv-label">LVL</span>
      <span class="lv-num" id="lvNum">1</span>
    </div>
    <span class="speed-tag" id="speedTag">NORMAL</span>
    <div class="lives-row" id="livesRow">
      <span class="heart full">♥</span>
      <span class="heart full">♥</span>
      <span class="heart full">♥</span>
    </div>
  </div>

  <div class="prog-row">
    <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
    <span class="prog-label" id="progLabel">LVL 5 ▶</span>
  </div>

  <div class="seq-wrap" id="seqWrap"></div>
  <div class="phase-bar" id="phasebar">READY</div>

  <div id="gameGrid">
    <div class="tile" data-id="0"><div class="tile-face"></div><div class="tile-veil"></div><div class="tc tl"></div><div class="tc tr"></div><div class="tc bl"></div><div class="tc br"></div><div class="tile-num">01</div></div>
    <div class="tile" data-id="1"><div class="tile-face"></div><div class="tile-veil"></div><div class="tc tl"></div><div class="tc tr"></div><div class="tc bl"></div><div class="tc br"></div><div class="tile-num">02</div></div>
    <div class="tile" data-id="2"><div class="tile-face"></div><div class="tile-veil"></div><div class="tc tl"></div><div class="tc tr"></div><div class="tc bl"></div><div class="tc br"></div><div class="tile-num">03</div></div>
    <div class="tile" data-id="3"><div class="tile-face"></div><div class="tile-veil"></div><div class="tc tl"></div><div class="tc tr"></div><div class="tc bl"></div><div class="tc br"></div><div class="tile-num">04</div></div>
    <div class="tile" data-id="4"><div class="tile-face"></div><div class="tile-veil"></div><div class="tc tl"></div><div class="tc tr"></div><div class="tc bl"></div><div class="tc br"></div><div class="tile-num">05</div></div>
    <div class="tile" data-id="5"><div class="tile-face"></div><div class="tile-veil"></div><div class="tc tl"></div><div class="tc tr"></div><div class="tc bl"></div><div class="tc br"></div><div class="tile-num">06</div></div>
  </div>

  <button id="startBtn">▶  INITIALIZE</button>
</div>

<div id="lvOverlay"><div class="lv-up-txt" id="lvUpTxt">LEVEL UP</div></div>

<div class="modal-overlay" id="saveModal">
  <div class="modal">
    <div class="modal-title">GAME<br>OVER</div>
    <div class="modal-sub">// SIGNAL TERMINATED</div>
    <div class="modal-stats">
      <div class="stat-cell"><span class="stat-lbl">SCORE</span><span class="stat-val" id="finalScore">0</span></div>
      <div class="stat-cell"><span class="stat-lbl">LEVEL</span><span class="stat-val" id="finalLvl">1</span></div>
      <div class="stat-cell"><span class="stat-lbl">BEST</span><span class="stat-val"  id="bestScore">0</span></div>
    </div>
    <button class="btn-ad"      id="watchAdBtn">▶  WATCH AD — CONTINUE</button>
    <button class="btn-restart" id="restartBtn">RESTART</button>
  </div>
</div>

<script>
"use strict";

/* ============================================================
   PLATFORM DETECTION
   Detects which portal is hosting the game so the right SDK
   handles ads automatically — no manual config needed.
============================================================ */
const PLATFORM = (() => {
  const h = location.hostname, u = location.href;
  if (h.includes('poki.com')             || u.includes('poki'))            return 'poki';
  if (h.includes('crazygames.com')       || u.includes('crazygames'))      return 'crazygames';
  if (h.includes('gamedistribution.com') || u.includes('gamedistribution'))return 'gd';
  return 'standalone';
})();

/* ============================================================
   GAMEDISTRIBUTION CONFIG
   Must be set BEFORE the GD SDK script runs.
   Replace the gameId with your real GD game ID from the dashboard.
============================================================ */
window.GD_OPTIONS = {
  gameId: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx",   // ← paste your GD game ID here
  onEvent: function(e) {
    if (e.name === 'SDK_GAME_START') gpStart();
    if (e.name === 'SDK_GAME_PAUSE') gpStop();
  }
};

/* ============================================================
   AD LOADING SCREEN
============================================================ */
let _adBarTimer = null;

function showAdScreen(txt) {
  document.getElementById('adTxt').textContent = txt || 'LOADING AD...';
  document.getElementById('adBar').style.width = '0%';
  document.getElementById('adScreen').classList.add('visible');
  let pct = 0;
  _adBarTimer = setInterval(() => {
    pct = Math.min(pct + 1.2, 92);
    document.getElementById('adBar').style.width = pct + '%';
  }, 120);
}

function hideAdScreen() {
  clearInterval(_adBarTimer);
  document.getElementById('adBar').style.width = '100%';
  setTimeout(() => document.getElementById('adScreen').classList.remove('visible'), 300);
}

/* ============================================================
   GAMEPLAY SIGNALS
   Tell portals when the player is actively playing vs
   in a menu/ad so they track sessions correctly.
============================================================ */
function gpStop() {
  try { window.CrazyGames?.SDK?.game?.gameplayStop(); } catch {}
  try { window.PokiSDK?.gameplayStop?.();             } catch {}
}
function gpStart() {
  try { window.CrazyGames?.SDK?.game?.gameplayStart(); } catch {}
  try { window.PokiSDK?.gameplayStart?.();             } catch {}
}

/* ============================================================
   UNIVERSAL AD BRIDGE
   requestAd('midgame')  — auto break between rounds
   requestAd('rewarded') — player opts in for extra life
   
   Supports: CrazyGames v3 · Poki v2 · GameDistribution · standalone
============================================================ */
async function requestAd(type) {
  gpStop();
  showAdScreen(type === 'rewarded' ? 'LOADING REWARD AD...' : 'BRIEF BREAK...');
  let ok = false;

  try {
    // ---- CrazyGames ----
    if (window.CrazyGames?.SDK?.ad) {
      ok = await new Promise(resolve => {
        window.CrazyGames.SDK.ad.requestAd(
          type === 'rewarded' ? 'rewarded' : 'midgame',
          { adFinished: () => resolve(true), adError: () => resolve(false) }
        );
      });

    // ---- Poki ----
    } else if (window.PokiSDK) {
      ok = type === 'rewarded'
        ? await PokiSDK.rewardedBreak().then(r => !!r).catch(() => false)
        : await PokiSDK.commercialBreak().then(() => true).catch(() => false);

    // ---- GameDistribution ----
    } else if (window.gdsdk) {
      const t = type === 'rewarded' ? gdsdk.AdType.Rewarded : gdsdk.AdType.Interstitial;
      ok = await gdsdk.showAd(t).then(() => true).catch(() => false);

    // ---- Standalone / local testing fallback ----
    } else {
      await new Promise(r => setTimeout(r, 1200));
      ok = true;
    }
  } catch(e) {
    ok = true; // Never block game on ad failure
  }

  hideAdScreen();
  gpStart();
  return ok;
}

/* ============================================================
   MIDGAME AD SCHEDULER  — fires every 5 levels
============================================================ */
let _lastAdLvl = 0;
async function maybeMidgameAd(lvl) {
  if (lvl - _lastAdLvl >= 5 && lvl > 1) {
    _lastAdLvl = lvl;
    await requestAd('midgame');
  }
}

/* ============================================================
   PARTICLES
============================================================ */
const cnv  = document.getElementById('particleCanvas');
const pctx = cnv.getContext('2d');
let parts  = [];
const TCOLS = ['#FF2222','#AAFF00','#FFE500','#FF6B00','#FF2D78','#FFFFFF'];

function resizeCnv() { cnv.width = innerWidth; cnv.height = innerHeight; }
resizeCnv();
window.addEventListener('resize', resizeCnv);

function spawnParticles(x, y, id) {
  const col = TCOLS[id];
  for (let i = 0; i < 22; i++) {
    const ang = (Math.PI*2/22)*i + (Math.random()-0.5)*0.8;
    const sp  = 2.5 + Math.random()*5.5;
    parts.push({
      x, y,
      vx: Math.cos(ang)*sp, vy: Math.sin(ang)*sp,
      life: 1, sz: 3+Math.random()*5, col,
      decay: 0.028+Math.random()*0.018
    });
  }
}

(function tick() {
  pctx.clearRect(0,0,cnv.width,cnv.height);
  parts = parts.filter(p => p.life > 0.01);
  for (const p of parts) {
    pctx.globalAlpha = p.life*p.life;
    pctx.fillStyle   = p.col;
    pctx.shadowBlur  = 8; pctx.shadowColor = p.col;
    pctx.fillRect(p.x-p.sz/2, p.y-p.sz/2, p.sz, p.sz);
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.vx*=0.94; p.sz*=0.96; p.life-=p.decay;
  }
  pctx.globalAlpha=1; pctx.shadowBlur=0;
  requestAnimationFrame(tick);
})();

/* ============================================================
   SCORE FLOAT
============================================================ */
function floatScore(x, y, txt) {
  const el = document.createElement('div');
  el.textContent = txt;
  Object.assign(el.style, {
    position:'fixed', left:x+'px', top:y+'px',
    transform:'translate(-50%,-50%)',
    fontFamily:"'Bebas Neue',sans-serif", fontSize:'28px',
    color:'#AAFF00', pointerEvents:'none', zIndex:600,
    textShadow:'0 0 12px #AAFF00',
    animation:'scoreFloat 0.85s ease forwards'
  });
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

/* ============================================================
   AUDIO
============================================================ */
const AC = window.AudioContext || window.webkitAudioContext;
let aCtx;
function playTone(id) {
  if (!aCtx) aCtx = new AC();
  if (aCtx.state === 'suspended') aCtx.resume();
  const freqs = [261.63,293.66,329.63,349.23,392.00,440.00];
  const osc = aCtx.createOscillator(), g = aCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freqs[id], aCtx.currentTime);
  g.gain.setValueAtTime(0.12, aCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, aCtx.currentTime+0.5);
  osc.connect(g); g.connect(aCtx.destination);
  osc.start(); osc.stop(aCtx.currentTime+0.5);
}

/* ============================================================
   GAME STATE
============================================================ */
const S = {
  level:1, score:0, lives:3,
  seq:[], input:[], phase:'idle',
  best: parseInt(localStorage.getItem('mfbest')||'0')
};
const tiles    = [...document.querySelectorAll('.tile')];
const startBtn = document.getElementById('startBtn');
const modal    = document.getElementById('saveModal');

/* ============================================================
   UI HELPERS
============================================================ */
function renderLives() {
  const row = document.getElementById('livesRow');
  row.innerHTML = '';
  for (let i=0;i<3;i++) {
    const h = document.createElement('span');
    h.className   = 'heart '+(i<S.lives?'full':'empty');
    h.textContent = i<S.lives?'♥':'♡';
    row.appendChild(h);
  }
}

function renderProgress() {
  const c = (S.level-1)%5;
  document.getElementById('progFill').style.width = (c/5*100)+'%';
  document.getElementById('progLabel').textContent = 'LVL '+Math.ceil(S.level/5)*5+' ▶';
}

function renderSpeed() {
  const el=document.getElementById('speedTag'), lv=S.level;
  let txt='NORMAL',col='';
  if      (lv>=10){txt='CHAOS'; col='#FF2222';}
  else if (lv>=7) {txt='FAST';  col='#FF6B00';}
  else if (lv>=4) {txt='QUICK'; col='#FFE500';}
  el.textContent=txt; el.style.color=col; el.style.borderColor=col;
}

function renderSeq() {
  const wrap=document.getElementById('seqWrap');
  wrap.innerHTML='';
  const len=S.seq.length, done=S.input.length;
  const show=Math.min(len,30), off=len>30?len-30:0;
  for (let i=0;i<show;i++) {
    const d=document.createElement('div');
    d.className='sdot';
    const idx=i+off;
    if (idx<done) d.classList.add('done');
    else if (idx===done && S.phase==='input') d.classList.add('cur');
    wrap.appendChild(d);
  }
}

function setPhase(p) {
  const bar=document.getElementById('phasebar');
  bar.className='phase-bar';
  if (p==='showing') {
    bar.textContent='WATCH SEQUENCE'; bar.classList.add('watch');
    tiles.forEach(t=>{t.style.pointerEvents='none';t.style.cursor='default';});
  } else if (p==='input') {
    bar.textContent='YOUR TURN'; bar.classList.add('go');
    tiles.forEach(t=>{t.style.pointerEvents='';t.style.cursor='pointer';});
  } else {
    bar.textContent='READY';
    tiles.forEach(t=>{t.style.pointerEvents='none';t.style.cursor='default';});
  }
}

function showLvUp(n) {
  document.getElementById('lvUpTxt').textContent='LEVEL  '+n;
  const ov=document.getElementById('lvOverlay');
  ov.classList.remove('show'); void ov.offsetWidth; ov.classList.add('show');
}

function bumpScore() {
  const el=document.getElementById('scoreDisplay');
  el.classList.add('bump'); setTimeout(()=>el.classList.remove('bump'),300);
}

function popLv() {
  const el=document.getElementById('lvNum');
  el.classList.add('pop'); setTimeout(()=>el.classList.remove('pop'),350);
}

/* ============================================================
   SEQUENCE PLAYBACK
============================================================ */
const delay = ms => new Promise(r => setTimeout(r,ms));

async function playPattern() {
  S.phase='showing'; setPhase('showing'); renderSeq();
  for (const id of S.seq) {
    const dur = S.level>=10
      ? 150+Math.random()*120
      : Math.max(240, 700-S.level*50);
    if (S.level>=10) document.body.classList.add('shaking');
    playTone(id);
    tiles[id].classList.add('flash');
    await delay(dur);
    tiles[id].classList.remove('flash');
    document.body.classList.remove('shaking');
    await delay(150);
  }
  S.phase='input'; setPhase('input'); renderSeq();
}

/* ============================================================
   TILE CLICKS
============================================================ */
tiles.forEach(tile => {
  tile.addEventListener('click', async () => {
    if (S.phase!=='input') return;
    const id = parseInt(tile.dataset.id);
    playTone(id);
    const r = tile.getBoundingClientRect();
    spawnParticles(r.left+r.width/2, r.top+r.height/2, id);
    tile.classList.remove('clicked'); void tile.offsetWidth;
    tile.classList.add('clicked');
    setTimeout(()=>tile.classList.remove('clicked'),260);
    tile.classList.add('flash');
    setTimeout(()=>tile.classList.remove('flash'),110);

    if (id===S.seq[S.input.length]) {
      /* CORRECT */
      S.input.push(id); renderSeq();
      if (S.input.length===S.seq.length) {
        const pts = S.level*10;
        S.score+=pts;
        document.getElementById('scoreDisplay').textContent=S.score;
        bumpScore();
        const r2=tile.getBoundingClientRect();
        floatScore(r2.left+r2.width/2, r2.top, '+'+pts);
        S.level++;
        document.getElementById('lvNum').textContent=S.level;
        popLv(); renderProgress(); renderSpeed(); showLvUp(S.level);
        S.phase='locked'; setPhase('idle');
        await maybeMidgameAd(S.level);
        await delay(1100);
        S.seq.push(Math.floor(Math.random()*6));
        S.input=[]; playPattern();
      }
    } else {
      /* WRONG */
      tile.classList.add('wrong');
      setTimeout(()=>tile.classList.remove('wrong'),320);
      S.lives--; renderLives();
      if (S.lives<=0) {
        if (S.score>S.best) { S.best=S.score; localStorage.setItem('mfbest',S.best); }
        document.getElementById('finalScore').textContent=S.score;
        document.getElementById('finalLvl').textContent=S.level;
        document.getElementById('bestScore').textContent=S.best;
        modal.classList.add('visible'); setPhase('idle');
      } else {
        S.phase='locked'; setPhase('idle');
        await delay(600); S.input=[]; playPattern();
      }
    }
  });
});

/* ============================================================
   START
============================================================ */
startBtn.addEventListener('click', () => {
  if (aCtx?.state==='suspended') aCtx.resume();
  Object.assign(S,{level:1,lives:3,score:0,seq:[Math.floor(Math.random()*6)],input:[]});
  _lastAdLvl=0;
  document.getElementById('scoreDisplay').textContent='0';
  document.getElementById('lvNum').textContent='1';
  renderLives(); renderProgress(); renderSpeed(); renderSeq();
  startBtn.style.display='none';
  gpStart(); playPattern();
});

/* ============================================================
   MODAL BUTTONS
============================================================ */
document.getElementById('watchAdBtn').addEventListener('click', async () => {
  const ok = await requestAd('rewarded');
  if (ok) {
    S.lives=1; renderLives();
    modal.classList.remove('visible');
    S.input=[]; playPattern();
  }
});

document.getElementById('restartBtn').addEventListener('click', () => location.reload());

/* ============================================================
   INIT
============================================================ */
renderProgress(); renderSpeed();
window.addEventListener('load', () => {
  try { window.CrazyGames?.SDK?.game?.sdkGameLoadingStop?.(); } catch {}
});
</script>
